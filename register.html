<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація на гурток</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="green-bg">
    <div class="page-container">
        <!--Для речі знизу я використав інтернет бо мої знання HTML ще на дуже початковому рівні -->
        <a href="javascript:history.back()" class="back-arrow">←</a>
        
        <form class="reg-form" id="registrationForm">
            <div class="input-group">
                <label for="userName">Введіть ваш ПІБ</label>
                <input type="text" id="userName" placeholder="Прізвище Ім'я" required>
            </div>
            <div class="input-group">
                <label for="userClass">Введіть ваш клас</label>
                <input type="text" id="userClass" placeholder="Наприклад: 8-А" required>
            </div>
            <button type="submit" class="btn-cyan">Зареєструватися</button>
        </form>
</body>
</html>
